batch_size = 48
rollouts_per_example = 4
seq_len = 1536
max_steps = 200

[model]
name = "Qwen/Qwen3-4B-Base"

[train.sampling]
temperature = 0.8
max_completion_tokens = 384

[[train.env]]
id = "task-trace"
args = { data_path = "traces.processed.jsonl", max_samples = 512, max_trace_chars = 50000, timeout = 30 }

[[filters]]
type = "gibberish"
enforce = false

[[filters]]
type = "repetition"
enforce = false

[[filters]]
type = "zero_advantage"
enforce = false

[ckpt]
interval = 1000
